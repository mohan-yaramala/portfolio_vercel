<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohan's Portfolio 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            overflow: hidden;
            height: 100vh;
            cursor: default;
            user-select: none;
        }

        .desktop {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-auto-rows: 110px;
            gap: 20px;
            height: calc(100% - 80px);
            padding-bottom: 100px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .icon:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .icon:active {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .icon-image {
            width: 50px;
            height: 50px;
            margin-bottom: 8px;
            font-size: 48px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .icon-label {
            font-size: 12px;
            color: white;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            word-wrap: break-word;
            max-width: 90px;
        }

        .taskbar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-radius: 20px;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dock-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .dock-icon:hover {
            transform: translateY(-10px) scale(1.2);
            background: rgba(255, 255, 255, 0.25);
        }

        .dock-icon:active {
            transform: translateY(-5px) scale(1.1);
        }

        .dock-icon::after {
            content: attr(data-label);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .dock-icon:hover::after {
            opacity: 1;
        }

        .dock-separator {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 5px;
        }

        .status-bar {
            position: fixed;
            right: 16px;
            bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 12px;
            letter-spacing: 0.02em;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="icon" data-action="about">
            <div class="icon-image">👤</div>
            <div class="icon-label">About</div>
        </div>

        <div class="icon" data-action="projects">
            <div class="icon-image">📁</div>
            <div class="icon-label">Projects</div>
        </div>

        <div class="icon" data-action="skills">
            <div class="icon-image">⚡</div>
            <div class="icon-label">Skills</div>
        </div>

        <div class="icon" data-action="education">
            <div class="icon-image">🎓</div>
            <div class="icon-label">Education</div>
        </div>

        <div class="icon" data-action="resume">
            <div class="icon-image">📄</div>
            <div class="icon-label">Resume</div>
        </div>

        <div class="icon" data-action="contact">
            <div class="icon-image">✉️</div>
            <div class="icon-label">Contact Me</div>
        </div>

        <div class="icon" data-action="experience">
            <div class="icon-image">💼</div>
            <div class="icon-label">Experience</div>
        </div>

        <div class="icon" data-action="credits">
            <div class="icon-image">🎬</div>
            <div class="icon-label">Credits</div>
        </div>

        <div class="icon" data-action="achievements">
            <div class="icon-image">🏆</div>
            <div class="icon-label">Achievements</div>
        </div>

        <div class="icon" data-action="blog">
            <div class="icon-image">📝</div>
            <div class="icon-label">Blog</div>
        </div>

        <div class="icon" data-action="photos">
            <div class="icon-image">📷</div>
            <div class="icon-label">Photos</div>
        </div>

        <div class="icon" data-action="music">
            <div class="icon-image">🎵</div>
            <div class="icon-label">Music</div>
        </div>

        <div class="icon" data-action="settings">
            <div class="icon-image">⚙️</div>
            <div class="icon-label">Settings</div>
        </div>

        <div class="icon" data-action="github">
            <div class="icon-image">💻</div>
            <div class="icon-label">GitHub</div>
        </div>

        <div class="icon" data-action="linkedin">
            <div class="icon-image">🔗</div>
            <div class="icon-label">LinkedIn</div>
        </div>

        <div class="icon" data-action="tools">
            <div class="icon-image">🔧</div>
            <div class="icon-label">Tools</div>
        </div>
    </div>

    <div class="taskbar">
        <div class="dock-icon" data-label="About" data-action="about">👤</div>
        <div class="dock-icon" data-label="Experience" data-action="experience">💼</div>
        <div class="dock-icon" data-label="Projects" data-action="projects">📁</div>
        <div class="dock-icon" data-label="Contact" data-action="contact">✉️</div>
        <div class="dock-separator"></div>
        <div class="dock-icon" data-label="Resume" data-action="resume">📄</div>
        <div class="dock-icon" data-label="Skills" data-action="skills">⚡</div>
        <div class="dock-icon" data-label="GitHub" data-action="github">💻</div>
    </div>

    <div class="status-bar" aria-live="polite">
        <div class="status-item" id="statusDate">📅 --</div>
        <div class="status-item" id="statusTime">🕒 --</div>
        <div class="status-item" id="statusBattery">🔋 --%</div>
        <div class="status-item" id="statusWeather">⛅ --</div>
    </div>

    <script>
        // Handle dock icon clicks
        document.querySelectorAll('.dock-icon').forEach(icon => {
            icon.addEventListener('mousedown', (e) => {
                window.parent.postMessage('mousedown', '*');
            });

            icon.addEventListener('mouseup', (e) => {
                window.parent.postMessage('mouseup', '*');
            });

            icon.addEventListener('click', (e) => {
                const action = icon.getAttribute('data-action');
                
                if (action === 'projects') {
                    window.parent.postMessage('Projects', '*');
                } else if (action === 'about') {
                    window.location.href = './about-me.html';
                } else if (action === 'skills') {
                    window.location.href = './skills.html';
                } else if (action === 'contact') {
                    window.location.href = './contact.html';
                } else if (action === 'experience') {
                    window.location.href = './experience.html';
                } else if (action === 'resume') {
                    window.location.href = './assets/resume/Mohan5_resume%20(1).pdf';
                }
                
                console.log('Dock clicked:', action);
            });
        });

        // Handle desktop icon clicks (keep existing icons functional)
        document.querySelectorAll('.icon').forEach(icon => {
            icon.addEventListener('mousedown', (e) => {
                window.parent.postMessage('mousedown', '*');
            });

            icon.addEventListener('mouseup', (e) => {
                window.parent.postMessage('mouseup', '*');
            });

            icon.addEventListener('click', (e) => {
                const action = icon.getAttribute('data-action');
                
                // Send message to parent window
                if (action === 'projects') {
                    window.parent.postMessage('Projects', '*');
                } else if (action === 'about') {
                    // Navigate to about me page
                    window.location.href = './about-me.html';
                } else if (action === 'skills') {
                    window.location.href = './skills.html';
                } else if (action === 'contact') {
                    window.location.href = './contact.html';
                } else if (action === 'experience') {
                    window.location.href = './experience.html';
                } else if (action === 'resume') {
                    window.location.href = './assets/resume/Mohan5_resume%20(1).pdf';
                }
                
                console.log('Clicked:', action);
            });
        });

        const statusTime = document.getElementById('statusTime');
        const statusDate = document.getElementById('statusDate');
        const statusBattery = document.getElementById('statusBattery');
        const statusWeather = document.getElementById('statusWeather');

        const timeFormatter = new Intl.DateTimeFormat('en-US', {
            hour: 'numeric',
            minute: '2-digit'
        });

        const dateFormatter = new Intl.DateTimeFormat('en-US', {
            weekday: 'short',
            month: 'short',
            day: '2-digit'
        });

        const updateTime = () => {
            const now = new Date();
            statusTime.textContent = `🕒 ${timeFormatter.format(now)}`;
            statusDate.textContent = `📅 ${dateFormatter.format(now)}`;
        };

        updateTime();
        setInterval(updateTime, 60000);

        const updateBattery = (battery) => {
            const level = Math.round(battery.level * 100);
            statusBattery.textContent = `🔋 ${level}%`;
        };

        if ('getBattery' in navigator) {
            navigator.getBattery().then((battery) => {
                updateBattery(battery);
                battery.addEventListener('levelchange', () => updateBattery(battery));
            });
        } else {
            statusBattery.textContent = '🔋 --%';
        }

        const weatherIcons = {
            0: '☀️',
            1: '🌤️',
            2: '⛅',
            3: '☁️',
            45: '🌫️',
            48: '🌫️',
            51: '🌦️',
            53: '🌦️',
            55: '🌦️',
            61: '🌧️',
            63: '🌧️',
            65: '🌧️',
            71: '🌨️',
            73: '🌨️',
            75: '🌨️',
            80: '🌧️',
            81: '🌧️',
            82: '⛈️',
            95: '⛈️'
        };

        const loadWeather = async (lat, lon) => {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                if (!response.ok) {
                    throw new Error('Weather fetch failed');
                }
                const data = await response.json();
                const current = data.current_weather;
                if (!current) {
                    throw new Error('Missing weather data');
                }
                const icon = weatherIcons[current.weathercode] || '⛅';
                statusWeather.textContent = `${icon} ${Math.round(current.temperature)}°C`;
            } catch (error) {
                statusWeather.textContent = '⛅ --';
            }
        };

        if ('geolocation' in navigator) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    loadWeather(pos.coords.latitude, pos.coords.longitude);
                },
                () => {
                    statusWeather.textContent = '⛅ --';
                },
                { timeout: 5000 }
            );
        } else {
            statusWeather.textContent = '⛅ --';
        }
    </script>
</body>
</html>
